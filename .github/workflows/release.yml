name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (without v prefix, e.g., 1.0.0)'
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Build application
        run: npm run build

      - name: Generate changelog
        uses: TriPSs/conventional-changelog-action@v5
        id: changelog
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          version: ${{ inputs.version }}
          git-message: 'chore(release): v{version}'
          git-user-name: 'github-actions[bot]'
          git-user-email: 'github-actions[bot]@users.noreply.github.com'
          preset: 'conventionalcommits'
          release-count: 1
          skip-commit: false
          skip-tag: false
          skip-on-empty: true

      - name: Build and push Docker images
        if: ${{ steps.changelog.outputs.skipped == 'false' }}
        run: |
          VERSION=${{ inputs.version }}
          MAJOR=$(echo $VERSION | cut -d. -f1)
          
          docker buildx create --use
          
          # Login to Docker Hub
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
          
          # Login to GitHub Container Registry
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          
          # Build and push to Docker Hub
          docker buildx build --push \
            --tag databk/rustdesk-console:latest \
            --tag databk/rustdesk-console:$VERSION \
            --tag databk/rustdesk-console:$MAJOR \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            .
          
          # Build and push to GitHub Container Registry
          docker buildx build --push \
            --tag ghcr.io/databk/rustdesk-console:latest \
            --tag ghcr.io/databk/rustdesk-console:$VERSION \
            --tag ghcr.io/databk/rustdesk-console:$MAJOR \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            .

      - name: Create GitHub Release
        if: ${{ steps.changelog.outputs.skipped == 'false' }}
        uses: softprops/action-gh-release@v1
        with:
          tag: v${{ inputs.version }}
          name: v${{ inputs.version }}
          body: |
            ${{ steps.changelog.outputs.changelog }}
            
            ## Docker Images
            
            This release is available on:
            
            ### Docker Hub
            ```bash
            docker pull databk/rustdesk-console:${{ inputs.version }}
            docker pull databk/rustdesk-console:latest
            ```
            
            ### GitHub Container Registry
            ```bash
            docker pull ghcr.io/databk/rustdesk-console:${{ inputs.version }}
            docker pull ghcr.io/databk/rustdesk-console:latest
            ```
            
            ## Quick Start
            
            ```bash
            docker run -d \
              --name rustdesk-console \
              -p 3000:3000 \
              -e JWT_SECRET=your-secret-key \
              -e ADMIN_PASSWORD=your-password \
              databk/rustdesk-console:${{ inputs.version }}
            ```
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


